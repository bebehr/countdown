<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Eine einfache Countdown Webanwendung">
    <link type="image/svg+xml" rel="icon" href="/favicon.svg">
    <title>Countdown</title>
  </head>
  <body>
    <div class="position-fixed top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center custom-loading-overlay" id="loading-overlay">
      <div class="text-center text-body">
        <div class="spinner-border text-primary mb-2 custom-spinner-size" id="loading-spinner" role="status">
          <span class="visually-hidden">Lade Feiertage...</span>
        </div>
        <p class="mb-0 fw-bold">Feiertage werden geladen...</p>
      </div>
    </div>
    <header>
      <nav class="navbar navbar-expand-md bg-body-tertiary border-bottom">
        <div class="container-fluid">
          <a class="navbar-brand mb-0 h1" href="./">Countdown</a>
          <button class="navbar-toggler" type="button" aria-controls="navbar-collapse" aria-expanded="false" aria-label="Toggle navigation" data-bs-target="#navbar-collapse" data-bs-toggle="collapse">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-md-0">
              <li class="nav-item">
                <a class="nav-link active" href="./" aria-current="page">Dashboard</a>
              </li>
            </ul>
            <button class="btn btn-outline-secondary btn-sm" id="theme-toggle" type="button" aria-label="Design umschalten">
              🌓 Modus
            </button>
          </div>
        </div>
      </nav>
    </header>

    <main class="container mt-3" id="app">
      <h1>
        Dashboard<br>
        <small><time id="start-date" datetime=""></time> - <time id="end-date" datetime=""></time></small>
      </h1>
      <div class="card col">
        <div class="card-body">
          <h2 class="card-title">Tag <span id="days-passed"></span> von <span id="days-total"></span></h2>
          <div class="progress-stacked">
            <div class="progress" id="progress-done" role="progressbar" aria-label="Geschafft" aria-valuemax="100" aria-valuemin="0" aria-valuenow="0">
              <div class="progress-bar bg-success"><span id="progress-done-label"></span></div>
            </div>
            <div class="progress" id="progress-left" role="progressbar" aria-label="Offen" aria-valuemax="100" aria-valuemin="0" aria-valuenow="0">
              <div class="progress-bar bg-danger"><span id="progress-left-label"></span></div>
            </div>
          </div>
        </div>
        <div class="card-footer text-body-secondary">
          Noch <span id="count-down"></span> Tage
        </div>
      </div>
      <div class="card col mt-3">
        <div class="card-body">
          <h2 class="card-title">Arbeitstage</h2>
          <p class="card-text">Restliche Tage, abzüglich:</p>
          <ul>
            <li>Wochenenden</li>
            <li>Feiertage in NRW</li>
            <li>Bewegliche Ferientage</li>
          </ul>
        </div>
        <div class="card-footer text-body-secondary">
          Noch <span id="workdays-left"></span> Arbeitstage
        </div>
      </div>
    </main>
    <script src="/src/main.js" type="module"></script>
  </body>
</html>
