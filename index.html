<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Eine einfache Countdown Webanwendung">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Countdown</title>
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-md bg-dark border-bottom border-body" data-bs-theme="dark">
        <div class="container-fluid">
          <a class="navbar-brand mb-0 h1" href="/">Countdown</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="/">Dashboard</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main class="container mt-3" id="app">
      <h1>
        Dashboard<br>
        <small><time id="start-date" datetime=""></time> - <time id="end-date" datetime=""></time></small>
      </h1>
      <div class="card col">
        <div class="card-body">
          <h2 class="card-title">Tag <span id="days-passed"></span> von <span id="days-total"></span></h2>
          <div class="progress-stacked">
            <div class="progress" id="progress-done" role="progressbar" aria-label="Geschafft" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" style="width: 0%">
              <div class="progress-bar bg-success"><span id="progress-done-label"></span></div>
            </div>
            <div class="progress" id="progress-left" role="progressbar" aria-label="Offen" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" style="width: 0%">
              <div class="progress-bar bg-danger"><span id="progress-left-label"></span></div>
            </div>
          </div>
        </div>
        <div class="card-footer text-body-secondary">
          Noch <span id="count-down"></span> Tage
        </div>
      </div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
